server:
  port: 8082
  servlet:
    context-path: /

spring:
  application:
    name: suivi-projet

  datasource:
    url: jdbc:mysql://localhost:3306/suivi_projet_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=Africa/Casablanca&allowPublicKeyRetrieval=true
    username: root
    password:
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    open-in-view: false

  jackson:
    serialization:
      write-dates-as-timestamps: false
    date-format: yyyy-MM-dd

# JWT Configuration
app:
  jwt:
    secret: 5367566B59703373367639792F423F4528482B4D6251655468576D5A71347437
    expiration: 86400000  # 24 heures en ms

# Swagger / OpenAPI
springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operationsSorter: method
  default-produces-media-type: application/json

# Logging
logging:
  level:
    ma.toubkalit.suiviprojet: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
